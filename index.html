<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="给我亲爱的朋友们，一起轻松学汉语和拼音。" />
  <title>友言 · Chinese for Friends</title>
  <link rel="icon" href="assets/favicon-32.png" type="image/png" sizes="32x32" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/header.css" />
  <link rel="stylesheet" href="styles/sidebar.css" />
  <link rel="stylesheet" href="styles/lesson-layout.css" />
  <link rel="stylesheet" href="styles/sentence-builder.css" />
  <link rel="stylesheet" href="styles/pinyin.css" />
  <link rel="stylesheet" href="styles/quiz.css" />
  <link rel="stylesheet" href="styles/message-board.css" />
  <link rel="stylesheet" href="styles/drawer-grammar.css" />
  <link rel="stylesheet" href="styles/overlays.css" />
  <link rel="stylesheet" href="styles/responsive.css" />
</head>
<body>
  <div class="shell">
    <header>
      <button class="brand" id="homeButton" aria-label="Go to today's lesson">
        <span class="brand-mark">友</span>
        <span><b>友言</b><small id="brandTagline">Chinese for my dear friends</small></span>
      </button>
      <div class="header-actions">
        <span class="progress-pill" id="progressText"><i></i> A little Chinese every day</span>
        <div class="language-picker" aria-label="Choose system language">
          <span class="globe" aria-hidden="true">🌐</span>
          <span class="language-label" id="languageLabel">Choose system language</span>
          <div class="flag-list" id="languageSelect">
            <button class="flag active" data-language="en" aria-label="English" title="English">🇺🇸</button>
            <button class="flag" data-language="ja" aria-label="日本語" title="日本語">🇯🇵</button>
            <button class="flag" data-language="ko" aria-label="한국어" title="한국어">🇰🇷</button>
            <button class="flag" data-language="zh" aria-label="中文" title="中文">🇨🇳</button>
          </div>
        </div>
      </div>
    </header>

    <main>
      <nav class="rail" id="lessonNav" aria-label="Lesson navigation">
        <div class="day-nav-head">
          <button class="mini-calendar-button" id="openCalendar" aria-label="Open calendar" aria-expanded="false">
            <span>📅</span>
            <b id="dailyNavTitle">Daily lessons</b>
          </button>
          <small id="dailyNavHint">Scroll through days</small>
          <div class="mini-calendar-menu" id="calendarMenu" aria-hidden="true"></div>
        </div>
        <div class="day-scroll" id="dayRail"></div>
        <div class="rail-actions">
          <div class="rail-line"></div>
          <button class="rail-button system-trigger" id="openCurriculum">
            <span class="system-icon">P</span>
            <small id="systemNav">Pinyin course</small>
            <em id="systemHint">Start here →</em>
          </button>
          <button class="rail-button wish-trigger" id="openWishBoard" aria-label="Open message board">
            <span class="wish-icon">✎</span>
            <small id="wishNav">Message</small>
            <em id="wishTrigger">I want to learn...</em>
          </button>
        </div>
      </nav>

      <section class="lesson" id="lessonView" aria-live="polite">
        <div class="lesson-heading">
          <div>
            <p class="eyebrow" id="lessonDate">TODAY · 02</p>
            <h1 id="lessonTitle">先认识一下吧！</h1>
          </div>
          <div class="lesson-switch" id="lessonSwitch"></div>
        </div>

        <div class="lesson-grid">
          <article class="phrase-panel">
            <div class="section-label"><span>01</span><b id="phraseSection">Useful phrases</b></div>
            <div class="phrase-list" id="phraseList"></div>
          </article>

          <aside class="pinyin-panel">
            <div class="side-toolbox" id="sideToolbox"></div>
            <div class="pinyin-mini">
              <div class="section-label"><span>02</span><b id="pinyinSection">Today's pinyin</b></div>
              <div id="pinyinContent"></div>
            </div>
          </aside>
        </div>
      </section>
    </main>
  </div>

  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="drawer" id="curriculumDrawer" aria-hidden="true">
    <div class="drawer-head">
